# Codemagic CI — builds the iOS release on a cloud Mac and ships it to
# TestFlight. Requires (one-time, in the Codemagic web app):
#   1. An App Store Connect API key added under
#      Teams -> Integrations -> Developer Portal, named exactly "asc-key".
#   2. This repo connected as an application.
# Signing is fully automatic: Codemagic uses the API key to create/fetch the
# distribution certificate and provisioning profile for the bundle id.

workflows:
  ios-testflight:
    name: iOS -> TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: asc-key
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: dev.jheremiah.reset
      flutter: stable
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Analyze and test
        script: |
          flutter analyze
          flutter test
      - name: Apply signing profiles
        script: xcode-project use-profiles
      - name: Build signed IPA
        script: flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - jheremiah.dev@gmail.com
        notify:
          success: true
          failure: true
