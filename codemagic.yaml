# Codemagic CI — builds the iOS release on a cloud Mac and ships it to
# TestFlight.
#
# Setup this file expects (already configured):
#   - App Store Connect API key integration named "asc-key"
#     (Personal Account -> Integrations -> Developer Portal). It injects the
#     APP_STORE_CONNECT_* env vars the app-store-connect CLI reads.
#   - Secure variable group "signing" containing CERTIFICATE_PRIVATE_KEY
#     (an RSA key used to create the Apple Distribution certificate).
#
# Signing is done explicitly with `fetch-signing-files --create`, which
# creates the distribution certificate and App Store provisioning profile on
# first run — the managed ios_signing block only fetches pre-existing
# profiles and fails on a fresh bundle id.

workflows:
  ios-testflight:
    name: iOS -> TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: asc-key
    environment:
      groups:
        - signing
      flutter: stable
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Analyze and test
        script: |
          flutter analyze
          flutter test
      - name: Initialize keychain
        script: keychain initialize
      - name: Fetch or create signing files
        script: |
          app-store-connect fetch-signing-files "dev.jheremiah.reset" \
            --type IOS_APP_STORE \
            --platform IOS \
            --create
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Apply signing profiles
        script: xcode-project use-profiles
      - name: Build signed IPA
        # BUILD_NUMBER is Codemagic's per-app build counter — guarantees every
        # upload has a unique, increasing build number for TestFlight.
        # SENTRY_DSN comes from a Codemagic env group when crash reporting is
        # enabled; an empty value keeps telemetry fully off.
        script: flutter build ipa --release --build-number=$BUILD_NUMBER --dart-define=SENTRY_DSN=${SENTRY_DSN:-}
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - figueroa.jheremiah@gmail.com
        notify:
          success: true
          failure: true
